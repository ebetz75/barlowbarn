    <script>
        const canvas = document.getElementById('floorPlanCanvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('floorplan-upload');
        const inspector = document.getElementById('inspector-panel');
        const rotateSlider = document.getElementById('rotate-slider');
        const snapToggle = document.getElementById('snap-toggle');

        let bgImg = null;
        let layoutItems = [];
        let selectedItem = null;
        let pxf = 20; // Pixels per foot
        let isDragging = false;
        let dragOff = { x: 0, y: 0 };
        
        // History Management
        let history = [];
        let redoStack = [];

        function saveState() {
            history.push(JSON.stringify(layoutItems));
            if (history.length > 50) history.shift();
            redoStack = [];
            updateButtons();
        }

        function undo() {
            if (history.length > 1) {
                redoStack.push(history.pop());
                layoutItems = JSON.parse(history[history.length - 1]);
                selectedItem = null;
                draw();
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const next = redoStack.pop();
                history.push(next);
                layoutItems = JSON.parse(next);
                draw();
            }
        }

        function updateButtons() {
            document.getElementById('undo-btn').disabled = history.length <= 1;
            document.getElementById('redo-btn').disabled = redoStack.length === 0;
        }

        // Object Management
        function addItem(type, w = 6, h = 4) {
            saveState();
            const item = {
                id: Date.now(),
                type,
                x: 50, y: 50,
                w, h, // in feet
                angle: 0,
                color: type === 'coverUp' ? 'rgba(200,200,200,0.5)' : `hsla(${Math.random() * 360}, 60%, 70%, 0.8)`
            };
            layoutItems.push(item);
            select(item);
            draw();
        }

        function select(item) {
            selectedItem = item;
            inspector.classList.toggle('hidden', !item);
            if (item) rotateSlider.value = item.angle || 0;
            draw();
        }

        // Draw Logic
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bgImg) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

            layoutItems.forEach(item => {
                ctx.save();
                const wPx = item.w * pxf;
                const hPx = item.h * pxf;
                
                // Translate to center for rotation
                ctx.translate(item.x + wPx / 2, item.y + hPx / 2);
                ctx.rotate((item.angle || 0) * Math.PI / 180);

                ctx.fillStyle = item.color;
                ctx.strokeStyle = item === selectedItem ? '#f97316' : '#374151';
                ctx.lineWidth = item === selectedItem ? 3 : 1;

                if (item.type === 'round') {
                    ctx.beginPath();
                    ctx.arc(0, 0, wPx / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else {
                    ctx.fillRect(-wPx / 2, -hPx / 2, wPx, hPx);
                    ctx.strokeRect(-wPx / 2, -hPx / 2, wPx, hPx);
                }
                ctx.restore();
            });
        }

        // Canvas Events
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let found = null;
            for (let i = layoutItems.length - 1; i >= 0; i--) {
                const it = layoutItems[i];
                // Simple box check (ignoring rotation for hit detection for now for simplicity)
                if (mx > it.x && mx < it.x + it.w * pxf && my > it.y && my < it.y + it.h * pxf) {
                    found = it;
                    break;
                }
            }

            if (found) {
                isDragging = true;
                dragOff = { x: mx - found.x, y: my - found.y };
                select(found);
            } else {
                select(null);
            }
        });

        window.addEventListener('mousemove', e => {
            if (isDragging && selectedItem) {
                const rect = canvas.getBoundingClientRect();
                let nx = e.clientX - rect.left - dragOff.x;
                let ny = e.clientY - rect.top - dragOff.y;

                if (snapToggle.checked) {
                    nx = Math.round(nx / pxf) * pxf;
                    ny = Math.round(ny / pxf) * pxf;
                }

                selectedItem.x = nx;
                selectedItem.y = ny;
                draw();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                saveState();
            }
        });

        // Key Commands
        window.addEventListener('keydown', e => {
            if (!selectedItem) return;
            const step = snapToggle.checked ? pxf : 2;

            if (e.key === 'ArrowLeft') selectedItem.x -= step;
            if (e.key === 'ArrowRight') selectedItem.x += step;
            if (e.key === 'ArrowUp') selectedItem.y -= step;
            if (e.key === 'ArrowDown') selectedItem.y += step;
            if (e.key === 'Delete' || e.key === 'Backspace') {
                layoutItems = layoutItems.filter(i => i.id !== selectedItem.id);
                select(null);
                saveState();
            }
            if (e.ctrlKey && e.key === 'z') undo();
            if (e.ctrlKey && e.key === 'y') redo();
            draw();
        });

        // UI Listeners
        upload.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => {
                bgImg = new Image();
                bgImg.onload = () => {
                    canvas.width = 900;
                    canvas.height = 900 * (bgImg.height / bgImg.width);
                    draw();
                };
                bgImg.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        rotateSlider.oninput = e => {
            if (selectedItem) {
                selectedItem.angle = e.target.value;
                draw();
            }
        };

        document.getElementById('add-rect-btn').onclick = () => addItem('rectangle', 8, 4);
        document.getElementById('add-round-btn').onclick = () => addItem('round', 5, 5);
        document.getElementById('add-cover-btn').onclick = () => addItem('coverUp', 14, 14);
        document.getElementById('undo-btn').onclick = undo;
        document.getElementById('redo-btn').onclick = redo;
        document.getElementById('delete-btn').onclick = () => {
            layoutItems = layoutItems.filter(i => i.id !== selectedItem.id);
            select(null);
            saveState();
            draw();
        };

        // Init
        canvas.width = 800;
        canvas.height = 600;
        saveState();
        draw();
    </script>
</body>
</html>
